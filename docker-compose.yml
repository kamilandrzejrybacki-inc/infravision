services:
  web:
    image: nginx:alpine
    container_name: infravision
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - site-data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - infravision-net

volumes:
  site-data:

networks:
  infravision-net:
