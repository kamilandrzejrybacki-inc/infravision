---
# InfraVision Deployment Playbook
# Deploys the InfraVision infrastructure map to a target host
# with nginx serving, Caddy reverse proxy route, and daily n8n rebuild.
#
# Usage:
#   ansible-playbook deploy/setup.yml
#
# Requires: Docker on target host, Caddy on reverse proxy host

- name: Gather deployment configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: "Target host IP (default: 192.168.0.108 / lw-s1)"
      default: "192.168.0.108"
      private: false

    - name: target_ssh_user
      prompt: "SSH user on target host"
      default: "kamil"
      private: false

    - name: infra_domain
      prompt: "Base domain"
      default: "kamilandrzejrybacki.dpdns.org"
      private: false

    - name: infravision_subdomain
      prompt: "Subdomain for InfraVision"
      default: "infra"
      private: false

    - name: netbox_url
      prompt: "NetBox URL"
      default: "http://192.168.0.105:8081"
      private: false

    - name: netbox_token
      prompt: "NetBox API token"
      private: true

    - name: grafana_url
      prompt: "Grafana URL (reachable from target host)"
      default: "http://192.168.0.105:3000"
      private: false

    - name: grafana_token
      prompt: "Grafana service account token"
      private: true

  tasks:
    - name: Add target host to inventory
      ansible.builtin.add_host:
        name: infravision_target
        ansible_host: "{{ target_host_ip }}"
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        groups: infravision

    - name: Save deployment vars
      ansible.builtin.set_fact:
        deploy_vars:
          target_host_ip: "{{ target_host_ip }}"
          infra_domain: "{{ infra_domain }}"
          infravision_subdomain: "{{ infravision_subdomain }}"
          netbox_url: "{{ netbox_url }}"
          netbox_token: "{{ netbox_token }}"
          grafana_url: "{{ grafana_url }}"
          grafana_token: "{{ grafana_token }}"

- name: Deploy InfraVision
  hosts: infravision_target
  become: true
  vars:
    deploy: "{{ hostvars['localhost']['deploy_vars'] }}"
    install_dir: /opt/infravision
    ansible_repo_dir: /home/{{ ansible_user }}/Code/ansible
    app_port: 8090
    repo_url: "https://github.com/kamilandrzejrybacki-inc/infravision.git"
    ansible_repo_url: "https://github.com/kamilandrzejrybacki-inc/ansible.git"

  tasks:
    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ install_dir }}"
        - "{{ install_dir }}/dist-out"

    - name: Clone InfraVision repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ install_dir }}"
        version: main
        force: false
      become_user: "{{ ansible_user }}"

    - name: Clone Ansible repo (for data pipeline)
      ansible.builtin.git:
        repo: "{{ ansible_repo_url }}"
        dest: "{{ ansible_repo_dir }}"
        version: main
        force: false
      become_user: "{{ ansible_user }}"

    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ install_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: "0600"
        content: |
          NETBOX_URL={{ deploy.netbox_url }}
          NETBOX_TOKEN={{ deploy.netbox_token }}
          INFRA_DOMAIN={{ deploy.infra_domain }}
          ANSIBLE_PATH={{ ansible_repo_dir }}
          GRAFANA_URL={{ deploy.grafana_url }}
          GRAFANA_TOKEN={{ deploy.grafana_token }}

    - name: Pull node:20-alpine image
      community.docker.docker_image:
        name: node:20-alpine
        source: pull

    - name: Run initial build
      ansible.builtin.shell: |
        source {{ install_dir }}/.env
        export NETBOX_URL NETBOX_TOKEN INFRA_DOMAIN ANSIBLE_PATH GRAFANA_URL GRAFANA_TOKEN
        bash {{ install_dir }}/scripts/rebuild.sh
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      register: build_result

    - name: Show build output
      ansible.builtin.debug:
        msg: "{{ build_result.stdout_lines[-5:] }}"

    - name: Verify site is accessible
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}"
        status_code: 200
        timeout: 10
      register: health_check
      retries: 3
      delay: 2

    - name: Create daily rebuild cron job
      ansible.builtin.cron:
        name: "infravision-rebuild"
        minute: "0"
        hour: "0"
        job: >-
          cd {{ install_dir }} &&
          source .env &&
          export NETBOX_URL NETBOX_TOKEN INFRA_DOMAIN ANSIBLE_PATH GRAFANA_URL GRAFANA_TOKEN &&
          bash scripts/rebuild.sh >> /var/log/infravision-rebuild.log 2>&1
        user: "{{ ansible_user }}"

    - name: Create logrotate config
      ansible.builtin.copy:
        dest: /etc/logrotate.d/infravision
        content: |
          /var/log/infravision-rebuild.log {
            weekly
            rotate 4
            compress
            missingok
            notifempty
          }

    - name: Report deployment status
      ansible.builtin.debug:
        msg: >-
          InfraVision deployed at http://{{ ansible_host }}:{{ app_port }}
          Daily rebuild cron set for midnight.
          Add Caddy route for https://{{ deploy.infravision_subdomain }}.{{ deploy.infra_domain }}

- name: Add Caddy reverse proxy route
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    deploy: "{{ hostvars['localhost']['deploy_vars'] }}"
  tasks:
    - name: Show Caddy route to add
      ansible.builtin.debug:
        msg: |
          Add this to your Caddyfile template (secure-homelab-access/roles/caddy/templates/Caddyfile.j2):

          # InfraVision (infrastructure map on lw-s1)
          {{ '{{' }} _scheme {{ '}}' }}{{ '{{' }} subdomain_infravision {{ '}}' }}.{{ '{{' }} domain {{ '}}' }} {
              import rate_limit
              import proxy_headers
          {% raw %}{% if cloudflare_api_token | default('') and not cf_tunnel_name | default('') %}{% endraw %}
              import cf_tls
          {% raw %}{% endif %}{% endraw %}
              import authelia
              reverse_proxy http://{{ deploy.target_host_ip }}:8090
          }

          And add to group_vars/all.yml:
            subdomain_infravision: "{{ deploy.infravision_subdomain }}"
